<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>QuickBooks Authorization | Velocity AI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#05080F;--line:rgba(255,255,255,0.10);--teal:#2DD4BF;--amber:#F5A623;--txt:#E7ECF3;--dim:#AEB8C6}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:16px/1.6 'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:680px;width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--line);border-radius:16px;padding:32px}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--teal);box-shadow:0 0 12px var(--teal);display:inline-block;margin-right:8px}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:24px;margin:14px 0 6px}
  p{color:var(--dim);margin-bottom:14px}
  .ok{color:var(--teal);font-weight:600}
  .err{color:#F87171;font-weight:600}
  label{font-family:'Space Grotesk',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--dim);display:block;margin:14px 0 4px}
  .box{background:#0A1019;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-family:'Space Grotesk',monospace;font-size:13px;word-break:break-all;color:#fff}
  button{margin-top:18px;background:var(--amber);color:#05080F;font-weight:600;border:none;border-radius:10px;padding:12px 20px;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif}
  button:hover{filter:brightness(1.06)}
  .hint{font-size:13px;margin-top:16px}
  code{background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:5px;font-family:'Space Grotesk',monospace}
</style>
</head>
<body>
<div class="card">
  <div><span class="dot"></span><span style="font-family:'Space Grotesk',sans-serif;font-weight:600">Velocity AI</span></div>
  <h1 id="title">QuickBooks Authorization</h1>
  <p id="status">Reading authorization response…</p>

  <div id="result" style="display:none">
    <label>Copy this full URL and paste it into your terminal</label>
    <div class="box" id="fullurl"></div>
    <button onclick="copyUrl()">Copy URL</button>
    <p class="hint">Then run: <code>.venv/bin/python scripts/setup_quickbooks_oauth.py "&lt;paste URL&gt;"</code></p>
  </div>
</div>
<script>
  const q = new URLSearchParams(window.location.search);
  const code = q.get('code'), realm = q.get('realmId'), state = q.get('state'), err = q.get('error');
  const title = document.getElementById('title'), status = document.getElementById('status');
  if (err) {
    title.innerHTML = '<span class="err">Authorization failed</span>';
    status.textContent = 'Error: ' + err + '. Close this and try again from the terminal.';
  } else if (code && realm) {
    title.innerHTML = '<span class="ok">Authorized ✓</span>';
    status.textContent = 'Authorization received. Copy the URL below back into your terminal to finish.';
    document.getElementById('fullurl').textContent = window.location.href;
    document.getElementById('result').style.display = 'block';
  } else {
    status.textContent = 'No authorization code found in this URL. Start again from the terminal.';
  }
  function copyUrl(){ navigator.clipboard.writeText(window.location.href).then(()=>{ const b=document.querySelector('button'); b.textContent='Copied ✓'; setTimeout(()=>b.textContent='Copy URL',1500); }); }
</script>
</body>
</html>
